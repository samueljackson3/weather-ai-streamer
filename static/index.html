<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #4A90E2 0%, #5B8FC7 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        .clouds-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
            opacity: 0.7;
        }

        .cloud::before,
        .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 100px;
        }

        .cloud::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 10px;
        }

        .cloud::after {
            width: 60px;
            height: 60px;
            top: -30px;
            right: 10px;
        }

        .cloud1 {
            width: 100px;
            height: 40px;
            top: 10%;
            left: -150px;
            animation: float 25s infinite linear;
        }

        .cloud2 {
            width: 120px;
            height: 50px;
            top: 20%;
            left: -200px;
            animation: float 30s infinite linear;
            animation-delay: 5s;
        }

        .cloud3 {
            width: 90px;
            height: 35px;
            top: 35%;
            left: -150px;
            animation: float 28s infinite linear;
            animation-delay: 10s;
            opacity: 0.5;
        }

        .cloud4 {
            width: 110px;
            height: 45px;
            top: 50%;
            left: -180px;
            animation: float 32s infinite linear;
            animation-delay: 15s;
            opacity: 0.6;
        }

        .cloud5 {
            width: 100px;
            height: 40px;
            top: 65%;
            left: -150px;
            animation: float 26s infinite linear;
            animation-delay: 20s;
            opacity: 0.55;
        }

        @keyframes float {
            to {
                transform: translateX(calc(100vw + 200px));
            }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Error Banner */
        .error-banner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #FFE5E5;
            border-bottom: 2px solid #FF9999;
            color: #8B0000;
            padding: 16px 20px;
            z-index: 1000;
            animation: slideDown 0.3s ease-out;
        }

        .error-banner.show {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .error-banner-content {
            flex: 1;
        }

        .error-banner-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #8B0000;
            padding: 0 0 0 20px;
            line-height: 1;
        }

        .error-banner-close:hover {
            opacity: 0.7;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        /* Form Section */
        .form-section {
            background: white;
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            border-top: 4px solid #FFD700;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group:last-of-type {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #1a1a1a;
            font-size: 0.95rem;
        }

        label .required {
            color: #FF6B6B;
            margin-left: 4px;
        }

        /* Location Fields Grid */
        .location-fields {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .location-fields {
                grid-template-columns: 1fr;
            }
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 12px 14px;
            font-size: 0.95rem;
            border: 1px solid #BCDCE8;
            border-radius: 6px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #87CEEB;
            box-shadow: 0 0 0 3px rgba(135, 206, 235, 0.2);
        }

        input[type="text"]::placeholder {
            color: #A0C4D4;
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .options-grid > div {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Checkbox Toggle */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .checkbox-label {
            margin-bottom: 0;
            display: flex;
            align-items: center;
            height: 100%;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #FFD700;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 32px;
        }

        button {
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-generate {
            background: linear-gradient(135deg, #FFD700 0%, #FFC700 100%);
            color: #1a1a1a;
            flex: 1;
            max-width: 400px;
            font-weight: 700;
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }

        .btn-generate:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #E0F6FF;
            color: #1a1a1a;
            border: 2px solid #87CEEB;
        }

        .btn-clear:hover:not(:disabled) {
            background: #87CEEB;
            color: white;
        }

        /* Response Section */
        .response-section {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            border-top: 4px solid #87CEEB;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .response-empty {
            text-align: center;
            color: #5a7a8a;
            font-size: 0.95rem;
        }

        .response-content {
            width: 100%;
        }

        .response-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #E0F6FF;
        }

        .response-city {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a1a;
        }

        .response-meta {
            font-size: 0.85rem;
            color: #5a7a8a;
            margin-top: 4px;
        }

        .response-text {
            color: #1a1a1a;
            line-height: 1.7;
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .streaming-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #FFD700;
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #E0F6FF;
            border-top: 3px solid #87CEEB;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Animated Clouds Background -->
    <div class="clouds-background">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
        <div class="cloud cloud4"></div>
        <div class="cloud cloud5"></div>
    </div>

    <!-- Error Banner -->
    <div id="errorBanner" class="error-banner">
        <div class="error-banner-content" id="errorMessage"></div>
        <button class="error-banner-close" onclick="closeErrorBanner()">×</button>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Weather AI</h1>
            <p>Get AI-powered weather insights for any location</p>
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <form id="weatherForm">
                <!-- Location Fields -->
                <div class="location-fields">
                    <div>
                        <label for="city">City <span class="required">*</span></label>
                        <input
                            type="text"
                            id="city"
                            name="city"
                            placeholder="e.g., Charleston"
                            required
                            maxlength="50"
                        >
                    </div>
                    <div>
                        <label for="state">State</label>
                        <input
                            type="text"
                            id="state"
                            name="state"
                            placeholder="e.g., SC (optional)"
                            maxlength="50"
                        >
                    </div>
                    <div>
                        <label for="country">Country</label>
                        <input
                            type="text"
                            id="country"
                            name="country"
                            placeholder="e.g., US (optional)"
                            maxlength="50"
                        >
                    </div>
                </div>

                <!-- Options Grid -->
                <div class="options-grid">
                    <!-- Units Dropdown -->
                    <div>
                        <label for="units">Temperature Units</label>
                        <select id="units" name="units">
                            <option value="imperial">Fahrenheit (°F)</option>
                            <option value="metric">Celsius (°C)</option>
                            <option value="standard">Kelvin (K)</option>
                        </select>
                    </div>

                    <!-- Streaming Toggle -->
                    <div>
                        <label class="checkbox-label">
                            <div class="checkbox-group">
                                <input type="checkbox" id="streaming" name="streaming">
                                <span>Enable Streaming Response</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="button-group">
                    <button type="submit" class="btn-generate" id="generateBtn">
                        Generate
                    </button>
                    <button type="reset" class="btn-clear" id="clearBtn">
                        Clear
                    </button>
                </div>
            </form>
        </div>

        <!-- Response Section -->
        <div class="response-section">
            <div id="responseContainer" class="response-empty">
                Enter a city and click "Generate" to see the AI-powered weather summary
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('weatherForm');
        const generateBtn = document.getElementById('generateBtn');
        const responseContainer = document.getElementById('responseContainer');
        const errorBanner = document.getElementById('errorBanner');
        const errorMessage = document.getElementById('errorMessage');
        const streamingCheckbox = document.getElementById('streaming');

        // Generic error handler
        function showError(message) {
            errorMessage.textContent = message;
            errorBanner.classList.add('show');
        }

        function closeErrorBanner() {
            errorBanner.classList.remove('show');
        }

        // Build API URL with query parameters
        function buildApiUrl(city, units, state, country, streaming) {
            let url = `/weather-ai/${encodeURIComponent(city)}?`;
            url += `units=${encodeURIComponent(units)}`;
            url += `&stream=${streaming}`;

            if (state && state.trim()) {
                url += `&state=${encodeURIComponent(state.trim())}`;
            }
            if (country && country.trim()) {
                url += `&country=${encodeURIComponent(country.trim())}`;
            }

            return url;
        }

        // Handle streaming response
        async function handleStreamingResponse(response, city) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = '';

            // Initial response UI
            responseContainer.innerHTML = `
                <div class="response-content">
                    <div class="response-header">
                        <div>
                            <div class="response-city">${city}</div>
                            <div class="response-meta">AI Response <span class="streaming-indicator"></span></div>
                        </div>
                    </div>
                    <div class="response-text" id="streamingText"></div>
                </div>
            `;

            const streamingText = document.getElementById('streamingText');
            let buffer = '';

            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    buffer += chunk;

                    // Split by double newlines (SSE message boundary)
                    const messages = buffer.split('\n\n');
                    
                    // Keep the last incomplete message in the buffer
                    buffer = messages.pop() || '';

                    for (const message of messages) {
                        if (!message.trim()) continue;

                        // Parse SSE format: "data: {token}"
                        const lines = message.split('\n');
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const token = line.slice(6);
                                
                                if (token === '[DONE]') {
                                    // Streaming complete
                                    const metaElement = document.querySelector('.response-meta');
                                    if (metaElement) {
                                        metaElement.textContent = 'AI Response';
                                    }
                                    return;
                                }

                                if (token) {
                                    fullText += token;
                                    streamingText.textContent = fullText;
                                    // Auto-scroll to bottom
                                    streamingText.scrollTop = streamingText.scrollHeight;
                                }
                            }
                        }
                    }
                }

                // Handle any remaining buffer content
                if (buffer.trim() && buffer.startsWith('data: ')) {
                    const token = buffer.slice(6).trim();
                    if (token && token !== '[DONE]') {
                        fullText += token;
                        streamingText.textContent = fullText;
                    }
                }

                // Streaming complete - remove loading indicator
                const metaElement = document.querySelector('.response-meta');
                if (metaElement) {
                    metaElement.textContent = 'AI Response';
                }
            } catch (error) {
                throw new Error(`Streaming failed: ${error.message}`);
            }
        }

        // Handle non-streaming response
        async function handleJsonResponse(response, city) {
            const data = await response.json();

            responseContainer.innerHTML = `
                <div class="response-content">
                    <div class="response-header">
                        <div>
                            <div class="response-city">${city}</div>
                            <div class="response-meta">AI Response</div>
                        </div>
                    </div>
                    <div class="response-text">${data.summary || 'No response received'}</div>
                </div>
            `;
        }

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            closeErrorBanner();

            const city = document.getElementById('city').value.trim();
            const state = document.getElementById('state').value.trim();
            const country = document.getElementById('country').value.trim();
            const units = document.getElementById('units').value;
            const streaming = streamingCheckbox.checked;

            // Validate city
            if (!city) {
                showError('City is required');
                return;
            }

            if (city.length < 2) {
                showError('City must be at least 2 characters');
                return;
            }

            // Show loading state
            generateBtn.disabled = true;
            responseContainer.innerHTML = `
                <div class="response-content" style="text-align: center;">
                    <div class="loading-spinner"></div>
                    <p style="margin-top: 16px; color: #999;">
                        ${streaming ? 'Streaming' : 'Generating'} AI response for ${city}...
                    </p>
                </div>
            `;

            try {
                const url = buildApiUrl(city, units, state, country, streaming);
                const response = await fetch(url);

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || `API error: ${response.status}`);
                }

                if (streaming) {
                    await handleStreamingResponse(response, city);
                } else {
                    await handleJsonResponse(response, city);
                }
            } catch (error) {
                console.error('Request failed:', error);
                showError(`Error: ${error.message}`);
                responseContainer.innerHTML = `
                    <div class="response-empty">
                        An error occurred. Please try again.
                    </div>
                `;
            } finally {
                generateBtn.disabled = false;
            }
        });

        // Clear button handler
        document.getElementById('clearBtn').addEventListener('click', () => {
            form.reset();
            responseContainer.innerHTML = `
                <div class="response-empty">
                    Enter a city and click "Generate" to see the AI-powered weather summary
                </div>
            `;
            closeErrorBanner();
        });
    </script>
</body>
</html>
